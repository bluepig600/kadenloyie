<!DOCTYPE html>
<html>
  <head><title>Bitcoin</title>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
.container {
  display: flex;
  justify-content: center; 
  align-items: center; 
  height: 100vh; 
}

.centered-box {
  width: 80%; 
  max-width: 500px;
  padding: 20px;
  background-color: orange;
  text-align: center;
}
.text-style {
    font-size: 24px;
    color: #056bfd;
    font-weight: bold;
    display: block;
    text-align: center;
}

/* CSS Blink Animation */
.blink {
    animation: blink-animation 1s steps(1, start) infinite;
}

@keyframes blink-animation {
    50% {
        color: #FFC0CB;
    }
}
  </style>
  </head>
  <body style="background-color:yellow;"><div class="container">
  <div class="centered-box"><h1>Bitcoin</h1><br>
  <p class="text-style blink">buy my bitcoin</p></div></div></body>
</html>
