<!DOCTYPE html>
<html>
  <head><title>Bitcoin</title>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
.container {
  display: flex;
  justify-content: center; 
  align-items: center; 
  height: 100vh; 
}

.centered-box {
  width: 80%; 
  max-width: 500px;
  padding: 20px;
  background-color: orange;
  text-align: center;
}
.clicky {
  margin: 0;
  background-color: lightblue;
  padding: 12px 24px;
  border-radius: 12px;
}
.text-style {
    margin: 0;
    font-size: 24px;
    color: #056bfd;
    font-weight: bold;
    display: block;
    text-align: center;
}

/* CSS Blink Animation */
.blink {
    animation: blink-animation 1s steps(1, start) infinite;
}

@keyframes blink-animation {
    50% {
        color: #FFC0CB;
    }
}
  </style>
  <script>
  document.addEventListener("DOMContentLoaded", function() {
    const rickrollButton = document.getElementById("rickrollButton");
    rickrollButton.addEventListener("click", function() {
        // Replace the URL below with the actual Rick Astley's video URL
        window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
    });
});</script>
  </head>
  <body style="background-color:yellow;"><div class="container">
  <div class="centered-box"><h1>Bitcoin</h1><br>
  <button class="clicky" id="rickrollButton"><p class="text-style blink">buy my bitcoin</p></button></div></div></body>
</html>
