<!DOCTYPE html>
<html>
  <head><title>Bitcoin</title>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
.container {
  display: flex; /* Turns on flexbox */
  justify-content: center; /* Centers things horizontally */
  align-items: center; /* Centers things vertically */
  height: 100vh; /* Takes up 100% of the screen height */
}

.centered-box {
  width: 80%; /* Takes up 80% of the screen width on phones */
  max-width: 500px; /* Stops the box from getting too wide on desktop monitors */
  padding: 20px;
  background-color: lightgray;
}</style>
  </head>
  <body><div class="container">
  <div class="centered-box"><h1>Bitcoin</h1></div><div class="centered-box"><p>buy my bitcoin</p></div></div></body>
</html>
